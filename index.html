<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Solana Coin</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #333; }
        button { background: #14f195; color: black; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #9945FF; color: white; }
        #walletAddress { margin-top: 20px; color: #aaa; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Coin</h1>
        <p>Connect your wallet to see your balance.</p>
        
        <button onclick="connectWallet()">Connect Phantom Wallet</button>
        
        <div id="walletAddress">Not Connected</div>
    </div>

    <script>
        async function connectWallet() {
            // Check if Phantom is installed
            const isPhantomInstalled = window.solana && window.solana.isPhantom;

            if (isPhantomInstalled) {
                try {
                    // Connect to wallet
                    const response = await window.solana.connect();
                    const publicKey = response.publicKey.toString();
                    
                    document.getElementById('walletAddress').innerText = "Connected: " + publicKey;
                    alert("Success! Connected to: " + publicKey);
                } catch (err) {
                    console.error("User rejected connection");
                }
            } else {
                alert("Please install Phantom Wallet from phantom.app");
                window.open("https://phantom.app/", "_blank");
            }
        }
    </script>
</body>
</html>
